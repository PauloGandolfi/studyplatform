server:
  port: 8081

app:
  jwt:
    secret: ${JWT_SECRET:studyplatform-local-dev-secret-must-be-changed-in-production}
    expiration: 1h
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  mail:
    from: ${MAIL_FROM:no-reply@studyplatform.local}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

  application:
    name: studyplatform-api

  docker:
    compose:
      enabled: false

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:6543/postgres?prepareThreshold=0}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres.PROJECT_ID}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true

  flyway:
    enabled: true

  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}
